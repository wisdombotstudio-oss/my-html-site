<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Think and Answer - Sequence Quiz</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif}
body{min-height:100vh;background:linear-gradient(135deg,#fff7fb,#e8fbff);display:flex;justify-content:center;align-items:center;padding:20px}
.quiz-box{width:100%;max-width:920px;background:white;border-radius:22px;padding:24px;box-shadow:0 10px 30px rgba(0,0,0,.15);border:4px solid #5fb6c4}
.header{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px;flex-wrap:wrap}
h1{color:#d41b7c;font-size:28px}
.badge{background:#5fb6c4;color:white;font-weight:bold;padding:8px 14px;border-radius:8px;font-size:15px}
p{font-size:20px;margin-bottom:16px;color:#222;text-align:left}
.image-wrap{position:relative;width:100%;max-width:900px;margin:auto}
.image-wrap img{width:100%;display:block;border-radius:10px}
.answer{position:absolute;width:6.8%;height:14%;border:2px solid #d72a8a;background:white;text-align:center;font-size:28px;font-weight:bold;color:#222;border-radius:2px;outline:none}
.answer:focus{box-shadow:0 0 0 3px rgba(215,42,138,.2)}
#box1{left:9.8%;top:67.8%}
#box2{left:33.4%;top:77.6%}
#box3{left:58.9%;top:70.0%}
#box4{left:82.2%;top:78.5%}
.correct{border-color:#1b8f37!important;background:#c9f7d1!important}
.wrong{border-color:#d32424!important;background:#ffd0d0!important}
.controls{text-align:center;margin-top:18px}
button{border:none;padding:12px 25px;border-radius:24px;font-size:17px;font-weight:bold;cursor:pointer;margin:5px;box-shadow:0 4px 10px rgba(0,0,0,.18)}
.submit{background:#d41b7c;color:white}
.reset{background:#ff9800;color:white}
.result{text-align:center;margin-top:12px;font-size:22px;font-weight:bold;color:#0d47a1;min-height:28px}
.note{font-size:15px;text-align:center;margin-top:8px;color:#555}
@media(max-width:600px){.quiz-box{padding:14px}h1{font-size:22px}p{font-size:16px}.answer{font-size:18px}.badge{font-size:12px}}
</style>
</head>

    <input id="box2" class="answer" maxlength="1" inputmode="numeric" aria-label="Bathing sequence number">
    <input id="box3" class="answer" maxlength="1" inputmode="numeric" aria-label="Brushing sequence number">

    <button class="submit" onclick="checkAnswers()">Submit</button>
    <button class="reset" onclick="resetQuiz()">Reset</button>

  <div class="result" id="result">Score: 0 / 4</div>
  <div class="note">Correct order: Brush teeth → Take bath → Eat food → Go to school</div>
</div>
<script>
const answers = { box1:'3', box2:'2', box3:'1', box4:'4' };
const boxes = Object.keys(answers);
boxes.forEach((id, index) => {
  const el = document.getElementById(id);
  el.addEventListener('input', () => {
    el.value = el.value.replace(/[^1-4]/g, '');
    el.classList.remove('correct','wrong');
    if(el.value && index < boxes.length-1) document.getElementById(boxes[index+1]).focus();
  });
});
function checkAnswers(){
  let score = 0;
  boxes.forEach(id => {
    const el = document.getElementById(id);
    el.classList.remove('correct','wrong');
    if(el.value.trim() === answers[id]) { el.classList.add('correct'); score++; }
    else { el.classList.add('wrong'); }
  });
  document.getElementById('result').innerText = `Score: ${score} / 4`;
  if(score === 4) setTimeout(()=>alert('Great Job! All answers are correct.'),200);
}
function resetQuiz(){
  boxes.forEach(id => { const el=document.getElementById(id); el.value=''; el.classList.remove('correct','wrong'); });
  document.getElementById('result').innerText = 'Score: 0 / 4';
  document.getElementById('box1').focus();
}
</script>
