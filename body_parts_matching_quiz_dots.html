<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Body Parts Matching Quiz</title>
<style>
*{box-sizing:border-box;font-family:Arial,Helvetica,sans-serif}
body{margin:0;background:#f7fbff;color:#222;display:flex;justify-content:center;padding:20px}
.quiz{width:100%;max-width:900px;background:white;border-radius:20px;padding:24px;box-shadow:0 8px 25px rgba(0,0,0,.12)}
h1{margin:0 0 8px;color:#1597b7;font-size:28px}
.instruction{font-size:20px;line-height:1.4;margin-bottom:18px}
.main-img{width:100%;max-width:720px;display:block;margin:0 auto 25px;border-radius:12px;border:2px solid #e8e8e8}
.game{display:grid;grid-template-columns:1fr 1fr;gap:150px;position:relative;padding:0 5px}
#lineLayer{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:1}
.column{display:flex;flex-direction:column;gap:12px;position:relative;z-index:2}
.item{border:2px solid #b8b8b8;border-radius:10px;padding:10px 18px;font-size:20px;cursor:pointer;min-height:46px;display:flex;align-items:center;justify-content:space-between;background:#ffe6d8;transition:.2s}
.left .item:nth-child(even){background:#dff5df}
.right .item:nth-child(odd){background:#ffe6d8}
.right .item:nth-child(even){background:#fff7d6}
.item:hover{transform:scale(1.02)}
.selected{outline:4px solid #23a6d5}
.correct{background:#bdf5c2!important;border-color:#29a946}
.wrong{background:#ffc8c8!important;border-color:#e53935}
.dot{width:18px;height:18px;border:2px solid #b8b8b8;border-radius:50%;background:white;flex:0 0 auto}
.dot.filled{background:#1597b7;border-color:#1597b7}
.controls{text-align:center;margin-top:24px}
button{border:none;border-radius:12px;background:#1597b7;color:white;padding:12px 26px;font-size:18px;cursor:pointer;margin:5px}
button:hover{background:#0f7f9b}
#score{font-size:22px;font-weight:bold;margin-top:12px;color:#1597b7}
@media(max-width:650px){.game{grid-template-columns:1fr;gap:20px}#lineLayer{display:none}.instruction{font-size:17px}.item{font-size:18px}.quiz{padding:15px}}
</style>
</head>
<body>

<div class="item" data-value="pumps blood"><span class="dot"></span> pumps blood</div>
<div class="item" data-value="breathe in and out"><span class="dot"></span> breathe in and out</div>
<div class="item" data-value="digests food"><span class="dot"></span> digests food</div>
</div>
</div>
<div class="controls"><button onclick="checkAnswers()">Check Answers</button><button onclick="resetQuiz()">Reset</button><div id="score"></div></div>
</div>
<script>
let selectedLeft=null; const matches=new Map(); const colors=['#1597b7','#27ae60','#f39c12','#8e44ad','#e74c3c'];
function dot(item){return item.querySelector('.dot')}
function fill(item){dot(item).classList.add('filled')}
function clearDots(){document.querySelectorAll('.dot').forEach(d=>d.classList.remove('filled'))}
function drawLines(){const svg=document.getElementById('lineLayer'), game=document.getElementById('gameArea'); svg.innerHTML=''; const box=game.getBoundingClientRect(); let i=0; clearDots(); matches.forEach((right,left)=>{let a=dot(left).getBoundingClientRect(), b=dot(right).getBoundingClientRect(); let line=document.createElementNS('http://www.w3.org/2000/svg','line'); line.setAttribute('x1',a.left+a.width/2-box.left); line.setAttribute('y1',a.top+a.height/2-box.top); line.setAttribute('x2',b.left+b.width/2-box.left); line.setAttribute('y2',b.top+b.height/2-box.top); line.setAttribute('stroke',colors[i++%colors.length]); line.setAttribute('stroke-width','4'); line.setAttribute('stroke-linecap','round'); svg.appendChild(line); fill(left); fill(right);})}
document.querySelectorAll('.left .item').forEach(item=>item.onclick=()=>{document.querySelectorAll('.left .item').forEach(i=>i.classList.remove('selected')); selectedLeft=item; item.classList.add('selected'); fill(item);});
document.querySelectorAll('.right .item').forEach(item=>item.onclick=()=>{if(!selectedLeft){alert('First select a body part from left side.');return} matches.set(selectedLeft,item); selectedLeft.classList.remove('selected'); selectedLeft=null; drawLines();});
function checkAnswers(){let score=0; document.querySelectorAll('.item').forEach(i=>i.classList.remove('correct','wrong','selected')); matches.forEach((right,left)=>{if(left.dataset.answer===right.dataset.value){left.classList.add('correct'); right.classList.add('correct'); score++;} else {left.classList.add('wrong'); right.classList.add('wrong');}}); document.getElementById('score').textContent=`Score: ${score} / 5`;}
function resetQuiz(){matches.clear(); selectedLeft=null; document.getElementById('lineLayer').innerHTML=''; clearDots(); document.querySelectorAll('.item').forEach(i=>i.classList.remove('correct','wrong','selected')); document.getElementById('score').textContent='';}
window.addEventListener('resize',drawLines);
</script>
</body>
</html>
