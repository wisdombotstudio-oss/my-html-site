<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Personal Hygiene Quiz</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif}
body{min-height:100vh;background:linear-gradient(135deg,#e0f7ff,#fff4d6);display:flex;justify-content:center;align-items:center;padding:20px}
.quiz-box{width:100%;max-width:900px;background:#fff;border-radius:24px;padding:25px;box-shadow:0 10px 30px rgba(0,0,0,.15);border:5px solid #13a8c9}
.header{text-align:center;margin-bottom:18px}
.header h1{color:#0d47a1;font-size:34px;margin-bottom:8px}
.header p{font-size:21px;color:#0ba6c7;font-weight:bold}
.image-wrap{position:relative;width:100%;max-width:782px;margin:0 auto;border-radius:16px;overflow:hidden;background:#fff}
.image-wrap img{display:block;width:100%;height:auto}
.hotspot{position:absolute;border:4px solid transparent;border-radius:50%;cursor:pointer;transition:.2s}
.hotspot:hover{border-color:#ffca28;background:rgba(255,202,40,.15)}
.hotspot.correct{border-color:#2e7d32;background:rgba(76,175,80,.22)}
.hotspot.wrong{border-color:#c62828;background:rgba(244,67,54,.22)}
.tick{position:absolute;right:4px;top:4px;background:#2e7d32;color:#fff;border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:bold}
.cross{position:absolute;right:4px;top:4px;background:#c62828;color:#fff;border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:bold}
.result{margin-top:18px;text-align:center;font-size:24px;font-weight:bold;color:#0d47a1}
.buttons{text-align:center;margin-top:16px}
.reset-btn{background:#ff9800;color:white;border:none;padding:13px 30px;border-radius:30px;font-size:18px;cursor:pointer;font-weight:bold;box-shadow:0 5px 12px rgba(0,0,0,.2)}
.reset-btn:hover{background:#f57c00}
.note{text-align:center;margin-top:8px;color:#555;font-size:15px}
@media(max-width:600px){.quiz-box{padding:15px}.header h1{font-size:26px}.header p{font-size:17px}.result{font-size:20px}.tick,.cross{width:26px;height:26px;font-size:18px}}
</style>
</head>
<body>
<div class="quiz-box">
  <div class="header">

<script>
let score = 0;
const totalCorrect = 4;
const hotspots = document.querySelectorAll('.hotspot');
hotspots.forEach(h => {
  h.addEventListener('click', () => {
    if (h.dataset.done === 'yes') return;
    h.dataset.done = 'yes';
    const ok = h.dataset.correct === 'true';
    const mark = document.createElement('span');
    if (ok) {
      h.classList.add('correct');
      mark.className = 'tick';
      mark.textContent = '✓';
      score++;
    } else {
      h.classList.add('wrong');
      mark.className = 'cross';
      mark.textContent = '×';
    }
    h.appendChild(mark);
    document.getElementById('result').textContent = `Score: ${score} / ${totalCorrect}`;
    if (score === totalCorrect) setTimeout(() => alert('Excellent! You selected all clean things.'), 200);
  });
});
function resetQuiz() {
  score = 0;
  document.getElementById('result').textContent = 'Score: 0 / 4';
  hotspots.forEach(h => {
    h.dataset.done = 'no';
    h.classList.remove('correct','wrong');
    h.innerHTML = '';
  });
}
</script>
