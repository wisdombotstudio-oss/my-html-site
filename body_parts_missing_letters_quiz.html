<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fill in the Missing Letters Quiz</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:'Segoe UI',Arial,sans-serif;background:linear-gradient(135deg,#e0f7ff,#fff7e8);color:#222}
.container{max-width:1100px;margin:25px auto;padding:22px;background:white;border-radius:22px;box-shadow:0 12px 30px rgba(0,0,0,.12)}
.header{display:flex;justify-content:space-between;align-items:center;gap:15px;flex-wrap:wrap}
h1{margin:0;color:#1395b3;font-size:30px}
.badge{background:#ef5b78;color:white;padding:12px 18px;border-radius:14px;font-weight:800;letter-spacing:.5px}
.instruction{font-size:20px;margin:14px 0 24px;font-weight:700}
.quiz{display:grid;grid-template-columns:repeat(4,1fr);gap:22px}
.card{text-align:center;background:#fffaf7;border:3px solid #ffe0c8;border-radius:20px;padding:18px 12px;transition:.2s}
.card.correct{border-color:#22c55e;background:#f0fff4}
.card.wrong{border-color:#ef4444;background:#fff1f1}
.num{font-size:22px;font-weight:700;margin-bottom:8px}
.card img{width:150px;height:150px;object-fit:contain;border-radius:18px;background:#fdeadc}
.word{margin-top:15px;display:flex;align-items:center;justify-content:center;gap:7px;font-size:25px;font-weight:700;letter-spacing:2px}
.letter{min-width:18px}
input{width:34px;height:38px;text-align:center;font-size:24px;font-weight:700;text-transform:uppercase;border:none;border-bottom:4px solid #333;background:transparent;outline:none}
input:focus{border-color:#1395b3}
.btns{display:flex;justify-content:center;gap:15px;margin-top:28px;flex-wrap:wrap}
button{border:none;border-radius:14px;padding:13px 24px;font-size:18px;font-weight:800;cursor:pointer}
.check{background:#1395b3;color:white}
.reset{background:#ffd166;color:#222}
.message{text-align:center;font-size:22px;font-weight:800;margin-top:18px;min-height:30px}
@media(max-width:850px){.quiz{grid-template-columns:repeat(2,1fr)}}
@media(max-width:520px){.quiz{grid-template-columns:1fr}h1{font-size:24px}.card img{width:130px;height:130px}}
</style>
</head>

<script>
document.querySelectorAll('input').forEach((input,idx,all)=>{
  input.addEventListener('input',()=>{
    input.value=input.value.toUpperCase();
    if(input.value && all[idx+1]) all[idx+1].focus();
  });
});
function checkAnswers(){
  let score=0;
  const cards=document.querySelectorAll('.card');
  cards.forEach(card=>{
    const ans=card.dataset.answer;
    const typed=[...card.querySelectorAll('input')].map(i=>i.value.toUpperCase()).join('');
    card.classList.remove('correct','wrong');
    if(typed===ans){card.classList.add('correct');score++;}
    else{card.classList.add('wrong');}
  });
  document.getElementById('message').textContent = score===cards.length ? 'Excellent! All answers are correct.' : `Score: ${score}/${cards.length}. Try again!`;
}
function resetQuiz(){
  document.querySelectorAll('input').forEach(i=>i.value='');
  document.querySelectorAll('.card').forEach(c=>c.classList.remove('correct','wrong'));
  document.getElementById('message').textContent='';
}
</script>
